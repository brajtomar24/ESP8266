<body>

<div class="main-container">

<script>
// WebSocket connection
let websocket = null;
let reconnectInterval = null;

// Initialize WebSocket connection
function initWebSocket() {
  const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${protocol}//${window.location.hostname}:81`;
  
  console.log('Connecting to WebSocket:', wsUrl);
  
  websocket = new WebSocket(wsUrl);
  
  websocket.onopen = function(event) {
    console.log('WebSocket connected');
    window.websocket = websocket;
    
    // Clear reconnect interval if exists
    if (reconnectInterval) {
      clearInterval(reconnectInterval);
      reconnectInterval = null;
    }
    
    // Request current status
    requestStatus();
  };
  
  websocket.onmessage = function(event) {
    console.log('WebSocket message received:', event.data);
    
    try {
      const data = JSON.parse(event.data);
      updateUIFromStatus(data);
    } catch (e) {
      console.error('Error parsing WebSocket message:', e);
    }
  };
  
  websocket.onclose = function(event) {
    console.log('WebSocket disconnected. Code:', event.code, 'Reason:', event.reason);
    window.websocket = null;
    
    // Attempt to reconnect after 3 seconds
    if (!reconnectInterval) {
      reconnectInterval = setInterval(initWebSocket, 3000);
    }
  };
  
  websocket.onerror = function(error) {
    console.error('WebSocket error:', error);
  };
}

// Request current status from server
function requestStatus() {
  if (websocket && websocket.readyState === WebSocket.OPEN) {
    websocket.send(JSON.stringify({type: 'getStatus'}));
  }
}

// Update UI from status data
function updateUIFromStatus(data) {
  if (data.status) {
    const statusElement = document.getElementById('status');
    if (statusElement) {
      statusElement.textContent = data.status;
    }
  }
  
  if (data.direction) {
    const directionElement = document.getElementById('direction');
    if (directionElement) {
      directionElement.textContent = data.direction;
    }
  }
  
  if (data.speed) {
    const speedElement = document.getElementById('speed-display');
    if (speedElement) {
      speedElement.textContent = data.speed;
    }
  }
}

// Send command via WebSocket
function sendCommand(cmd) {
  if (websocket && websocket.readyState === WebSocket.OPEN) {
    websocket.send(JSON.stringify({cmd: cmd}));
    console.log('Command sent via WebSocket:', cmd);
  } else {
    // Fallback to HTTP if WebSocket not available
    fetch('/cmd?c=' + cmd);
    console.log('Command sent via HTTP fallback:', cmd);
  }
  updateDirection(cmd);
}

// Send speed via WebSocket
function sendSpeed(val) {
  if (websocket && websocket.readyState === WebSocket.OPEN) {
    websocket.send(JSON.stringify({speed: parseInt(val)}));
    console.log('Speed sent via WebSocket:', val);
  } else {
    // Fallback to HTTP
    fetch('/speed?v=' + val);
    console.log('Speed sent via HTTP fallback:', val);
  }
}

// Send steering command via WebSocket
function sendSteering(cmd) {
  if (websocket && websocket.readyState === WebSocket.OPEN) {
    const steeringData = {
      steer: cmd,
      timestamp: Date.now()
    };
    websocket.send(JSON.stringify(steeringData));
    console.log('Steering sent via WebSocket:', steeringData);
  } else {
    // Fallback to HTTP
    fetch('/steer?s=' + cmd)
      .then(response => {
        if (response.ok) {
          console.log('Steering sent via HTTP fallback:', cmd);
        } else {
          console.error('HTTP steering command failed');
        }
      })
      .catch(error => {
        console.error('HTTP steering command error:', error);
      });
  }
}

// Send light command via WebSocket
function sendLight(cmd) {
  if (websocket && websocket.readyState === WebSocket.OPEN) {
    websocket.send(JSON.stringify({light: cmd}));
    console.log('Light sent via WebSocket:', cmd);
  } else {
    // Fallback to HTTP
    fetch('/light?c=' + cmd);
    console.log('Light sent via HTTP fallback:', cmd);
  }
}

// Send RGB command via WebSocket
function sendRGB(cmd) {
  if (websocket && websocket.readyState === WebSocket.OPEN) {
    websocket.send(JSON.stringify({rgb: cmd}));
    console.log('RGB sent via WebSocket:', cmd);
  } else {
    // Fallback to HTTP
    fetch('/rgb?c=' + cmd);
    console.log('RGB sent via HTTP fallback:', cmd);
  }
}

// GSAP Draggable steering implementation with Automatic Tilt Mode
const wheel = document.getElementById("wheel");

let tiltMode = false;
let draggableInstance = null;

// Initialize draggable steering
function initDraggableSteering() {
  draggableInstance = Draggable.create("#wheel", {
    type:"rotation",
    bounds:{minRotation:-120, maxRotation:120},

    onDrag:function(){
      // Allow override even in tilt mode when dragging is forced
      let angle = this.rotation;
      let steering = Math.round(angle/120*100);
      
      // Convert angle to simple L/R/C command
      let steerCmd;
      if (angle < -20) {
        steerCmd = "L";
      } else if (angle > 20) {
        steerCmd = "R";
      } else {
        steerCmd = "C";
      }
      
      sendSteering(steerCmd);
      console.log("Angle:", angle.toFixed(1), "Command:", steerCmd);
    },

    onDragEnd:function(){
      // Allow override even in tilt mode when dragging is forced
      
      // Auto-center on release
      TweenMax.to(this.target, 0.3, {
        rotation:0,
        duration:0.4,
        onUpdate:function() {
          sendSteering("C");
        },
        onComplete:function() {
          console.log("Steering centered");
        }
      });
    }
  });
}

// Check for tilt capability and auto-enable
function checkTiltCapability() {
  console.log("Checking tilt capability...");
  
  // Check if device orientation is available
  if (typeof DeviceOrientationEvent !== 'undefined') {
    console.log("Device orientation API is available");
    
    // Check if it's a mobile device (touch capability)
    const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    console.log("Is mobile device:", isMobile);
    
    if (isMobile) {
      console.log("Mobile device detected - enabling tilt mode automatically");
      enableTiltMode();
    } else {
      console.log("Desktop device detected - using drag mode");
      // Keep drag mode for desktop
    }
  } else {
    console.log("Device orientation not supported - using drag mode");
    // Keep drag mode if no orientation support
  }
}

// Enable tilt mode automatically
function enableTiltMode() {
  console.log("Enabling tilt mode...");
  
  // Disable draggable
  if (draggableInstance && draggableInstance[0]) {
    draggableInstance[0].disable();
    console.log("Draggable disabled");
  }
  
  tiltMode = true;
  console.log("Tilt mode set to true");
  
  // Request device orientation permission for iOS
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    console.log("Requesting iOS permission...");
    DeviceOrientationEvent.requestPermission()
      .then(response => {
        if (response === 'granted') {
          window.addEventListener('deviceorientation', handleOrientation);
          console.log("Tilt mode enabled with iOS permission");
        } else {
          console.log("iOS permission denied - falling back to drag mode");
          // Fallback to drag mode if permission denied
          disableTiltMode();
        }
      })
      .catch(error => {
        console.error("Error requesting iOS permission:", error);
        // Fallback to drag mode on error
        disableTiltMode();
      });
  } else {
    // Non-iOS devices or older browsers
    window.addEventListener('deviceorientation', handleOrientation);
    console.log("Tilt mode enabled for non-iOS device");
  }
}

// Disable tilt mode (fallback)
function disableTiltMode() {
  // Enable draggable
  if (draggableInstance && draggableInstance[0]) {
    draggableInstance[0].enable();
  }
  
  tiltMode = false;
  
  // Remove tilt listener
  window.removeEventListener('deviceorientation', handleOrientation);
  
  // Center steering
  sendSteering("C");
  console.log("Drag mode enabled (fallback)");
}

// Handle device orientation for tilt steering
function handleOrientation(event) {
  if (!tiltMode) return;
  
  // Use gamma for left-right tilt (-90 to 90)
  let tilt = event.gamma;
  
  if (tilt === null) return;
  
  // Increase tilt sensitivity: Clamp to -60 to 60 degrees for better turning
  tilt = Math.max(-60, Math.min(60, tilt));
  
  // Update wheel rotation visually
  const displayAngle = (tilt / 60) * 120; // Map to -120 to 120 for display
  wheel.style.transform = `rotate(${displayAngle}deg)`;
  
  // Convert tilt to simple L/R/C command
  let steerCmd;
  if (tilt < -20) {
    steerCmd = "L";
  } else if (tilt > 20) {
    steerCmd = "R";
  } else {
    steerCmd = "C";
  }
  
  // Only send command if it's different from the last one
  if (handleOrientation.lastSteerCmd !== steerCmd) {
    sendSteering(steerCmd);
    console.log("Tilt:", tilt.toFixed(1), "Angle:", displayAngle.toFixed(1), "Command:", steerCmd);
    handleOrientation.lastSteerCmd = steerCmd;
  }
}

// Manual toggle for tilt mode
function toggleTiltMode() {
  const toggleBtn = document.getElementById('tiltToggle');
  
  if (tiltMode) {
    // Disable tilt mode
    disableTiltMode();
    toggleBtn.textContent = 'Enable Tilt Mode';
    toggleBtn.style.background = '#4CAF50';
    console.log("Tilt mode manually disabled");
  } else {
    // Enable tilt mode
    enableTiltMode();
    toggleBtn.textContent = 'Disable Tilt Mode';
    toggleBtn.style.background = '#f44336';
    console.log("Tilt mode manually enabled");
  }
}

// Movement control function (updated to use WebSocket)
function send(cmd) {
  console.log('Movement command: ' + cmd);
  
  // Update UI immediately for better responsiveness
  updateDirection(cmd);
  
  // Send command via WebSocket
  if (websocket && websocket.readyState === WebSocket.OPEN) {
    const commandData = {
      cmd: cmd,
      timestamp: Date.now()
    };
    websocket.send(JSON.stringify(commandData));
    console.log('Command sent via WebSocket:', commandData);
  } else {
    // Fallback to HTTP if WebSocket not available
    fetch('/cmd?c=' + cmd)
      .then(response => {
        if (response.ok) {
          console.log('Command sent via HTTP fallback:', cmd);
        } else {
          console.error('HTTP command failed:', cmd);
        }
      })
      .catch(error => {
        console.error('HTTP command error:', error);
      });
  }
  
  // Update local status immediately
  updateStatus(cmd);
}

function updateStatus(cmd) {
  const statusElement = document.getElementById('status');
  const directionElement = document.getElementById('direction');
  const speedElement = document.getElementById('speed-display');
  
  let statusText = '';
  let statusClass = 'text-blue-400';
  let directionText = '';
  let directionClass = 'text-yellow-400';
  
  switch(cmd) {
    case 'F':
      statusText = '🚗 Moving Forward';
      statusClass = 'text-green-400';
      directionText = '🚗 Moving';
      directionClass = 'text-green-400';
      break;
    case 'B':
      statusText = '🚗 Moving Backward';
      statusClass = 'text-green-400';
      directionText = '🚗 Moving';
      directionClass = 'text-green-400';
      break;
    case 'S':
      statusText = '⏸️ Paused';
      statusClass = 'text-yellow-400';
      directionText = '🛑 Stopped';
      directionClass = 'text-yellow-400';
      break;
    default:
      statusText = '🛑 Ready';
      statusClass = 'text-blue-400';
      directionText = '🛑 Stopped';
      directionClass = 'text-yellow-400';
  }
  
  // Update all status elements
  if (statusElement) {
    statusElement.textContent = statusText;
    statusElement.className = statusClass;
  }
  
  if (directionElement) {
    directionElement.textContent = directionText;
    directionElement.className = directionClass;
  }
  
  // Get current speed value
  const currentSpeed = document.getElementById('v').textContent;
  if (speedElement && currentSpeed) {
    speedElement.textContent = currentSpeed + ' km/h';
  }
  
  // Send all status in single WebSocket request
  sendStatusWebSocket(statusText, directionText, currentSpeed);
}

// WebSocket function to send all status in single request
function sendStatusWebSocket(status, direction, speed) {
  // Create combined status data
  const statusData = {
    status: status,
    direction: direction,
    speed: speed,
    timestamp: Date.now()
  };
  
  // Send as single WebSocket message
  if (websocket && websocket.readyState === WebSocket.OPEN) {
    websocket.send(JSON.stringify(statusData));
  }
  
  console.log('Status sent:', statusData);
}
